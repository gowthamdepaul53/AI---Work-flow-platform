name: CI/CD — AI Workflow Platform

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]

env:
  GCP_PROJECT: ${{ secrets.GCP_PROJECT }}
  GCP_REGION: us-central1
  IMAGE_NAME: gcr.io/${{ secrets.GCP_PROJECT }}/ai-platform-api
  ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}

jobs:

  # ============================================================
  # 1. Test
  # ============================================================
  test:
    name: Test & Lint
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: platform
          POSTGRES_PASSWORD: platform
          POSTGRES_DB: platform_db_test
        ports: ["5432:5432"]
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint (ruff)
        run: ruff check agents/ api/ tests/

      - name: Type check (mypy)
        run: mypy agents/ api/ --ignore-missing-imports

      - name: Run tests
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY_TEST }}
          DATABASE_URL: postgresql://platform:platform@localhost:5432/platform_db_test
        run: pytest tests/ -v --cov=agents --cov=api --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml

  # ============================================================
  # 2. Build & Push Docker Image
  # ============================================================
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=semver,pattern={{version}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infrastructure/docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:cache
          cache-to: type=registry,ref=${{ env.IMAGE_NAME }}:cache,mode=max

  # ============================================================
  # 3. Deploy via ArgoCD (GitOps)
  # ============================================================
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging'

    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
      url: https://api.ai-platform.yourdomain.com

    steps:
      - uses: actions/checkout@v4

      - name: Update image tag in K8s manifests
        run: |
          IMAGE_TAG=${{ needs.build.outputs.image_tag }}
          sed -i "s|image: gcr.io/.*/ai-platform-api:.*|image: ${{ env.IMAGE_NAME }}:${IMAGE_TAG}|g" \
            infrastructure/kubernetes/deployment.yaml

      - name: Commit updated manifests
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add infrastructure/kubernetes/deployment.yaml
          git commit -m "ci: update image tag to ${{ needs.build.outputs.image_tag }}" || echo "No changes"
          git push

      # ArgoCD picks up the git change and syncs automatically (GitOps)
      - name: Trigger ArgoCD sync
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.ARGOCD_TOKEN }}" \
            "${{ env.ARGOCD_SERVER }}/api/v1/applications/ai-platform/sync" \
            -d '{"prune": true, "dryRun": false}'

      - name: Wait for rollout
        run: |
          curl -s \
            -H "Authorization: Bearer ${{ secrets.ARGOCD_TOKEN }}" \
            "${{ env.ARGOCD_SERVER }}/api/v1/applications/ai-platform" \
            | jq '.status.health.status'

  # ============================================================
  # 4. Terraform (infra changes only)
  # ============================================================
  terraform:
    name: Terraform Plan/Apply
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.modified, 'infrastructure/terraform/')

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Terraform Init
        working-directory: infrastructure/terraform
        run: terraform init

      - name: Terraform Plan
        working-directory: infrastructure/terraform
        run: |
          terraform plan \
            -var="gcp_project=${{ env.GCP_PROJECT }}" \
            -var="db_password=${{ secrets.DB_PASSWORD }}" \
            -out=tfplan

      - name: Terraform Apply (main only)
        if: github.ref == 'refs/heads/main'
        working-directory: infrastructure/terraform
        run: terraform apply -auto-approve tfplan
