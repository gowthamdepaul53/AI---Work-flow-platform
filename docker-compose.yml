version: "3.9"

# =============================================================================
# AI Workflow Orchestration Platform — Full Local Stack
# =============================================================================
# Services:
#   - api          FastAPI app (port 8000)
#   - n8n          Workflow orchestrator (port 5678)
#   - chromadb     Vector database (port 8001)
#   - postgres     Primary DB (port 5432)
#   - prometheus   Metrics scraper (port 9090)
#   - grafana      Dashboards (port 3000)
#   - otel         OpenTelemetry Collector (port 4317)
# =============================================================================

networks:
  platform-net:
    driver: bridge

volumes:
  postgres_data:
  chroma_data:
  n8n_data:
  prometheus_data:
  grafana_data:

services:

  # ---------------------------------------------------------------------------
  # FastAPI Application
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile
    container_name: ai-platform-api
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - HF_TOKEN=${HF_TOKEN}
      - DATABASE_URL=postgresql://platform:platform@postgres:5432/platform_db
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8001
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-*}
    depends_on:
      postgres:
        condition: service_healthy
      chromadb:
        condition: service_started
    networks:
      - platform-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ---------------------------------------------------------------------------
  # n8n — Workflow Orchestrator
  # ---------------------------------------------------------------------------
  n8n:
    image: n8nio/n8n:latest
    container_name: ai-platform-n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n_db
      - DB_POSTGRESDB_USER=platform
      - DB_POSTGRESDB_PASSWORD=platform
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY:-changeme-in-production}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n/workflows:/home/node/.n8n/workflows
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - platform-net
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # ChromaDB — Vector Database
  # ---------------------------------------------------------------------------
  chromadb:
    image: chromadb/chroma:latest
    container_name: ai-platform-chromadb
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - CHROMA_SERVER_AUTH_CREDENTIALS_PROVIDER=chromadb.auth.token.TokenConfigServerAuthCredentialsProvider
      - ALLOW_RESET=TRUE
    networks:
      - platform-net
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # PostgreSQL — Primary Database
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: ai-platform-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=platform
      - POSTGRES_PASSWORD=platform
      - POSTGRES_MULTIPLE_DATABASES=platform_db,n8n_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - platform-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U platform"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Prometheus — Metrics Collection
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: ai-platform-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    networks:
      - platform-net
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Grafana — Dashboards
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:latest
    container_name: ai-platform-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana-dashboard.json:/etc/grafana/provisioning/dashboards/platform.json
    depends_on:
      - prometheus
    networks:
      - platform-net
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # OpenTelemetry Collector
  # ---------------------------------------------------------------------------
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: ai-platform-otel
    ports:
      - "4317:4317"   # gRPC
      - "4318:4318"   # HTTP
      - "8888:8888"   # Prometheus metrics
    volumes:
      - ./monitoring/otel-collector.yml:/etc/otelcol-contrib/otel-collector.yml
    command: ["--config=/etc/otelcol-contrib/otel-collector.yml"]
    networks:
      - platform-net
    restart: unless-stopped
